<!doctype html>
<html lang="en">

<head>
	<title>Login</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="./assets/css/login.css">
</head>

<body>
	<section class="ftco-section">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-7 col-lg-5">
					<div class="wrap">
						<div class="img"
							style="background-image: url('assets/img/logo/logo_with_text_background.png');"></div>
						<div class="login-wrap p-4 p-md-5">
							<div class="d-flex">
								<div class="w-100">
									<h3 class="mb-4">Admin Login</h3>
								</div>
							</div>
							<form action="admin-login.php" method="POST" class="signin-form">
								<div class="form-group mt-3">
									<input type="text" class="form-control" name="user" required>
									<label class="form-control-placeholder">User Name</label>
								</div>
								<div class="form-group">
									<input id="password-field" type="password" class="form-control" name="pass"
										required>
									<label class="form-control-placeholder">Password</label>
									<span toggle="#password-field" class="fa fa-fw field-icon"></span>
								</div>
								<div class="form-group">
									<button type="submit" name="submit"
										class="form-control btn btn-primary rounded submit px-3" href="">Sign
										In</button>
									<!-- <a class="form-control btn btn-primary rounded submit px-3" href="http://localhost/task/view.php" role="button">Login</a> -->
								</div>
							</form>
							<p class="text-center">Not a member? <a href="./admin-register.html">Sign Up</a></p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<!-- <script src="./loginform/js/main.js"></script> -->

</body>

</html>
